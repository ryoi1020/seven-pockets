<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セブンポケット・ダッシュボード</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.8.0/dist/Recharts.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .summary-card h3 {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .summary-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .summary-card.revenue .value {
            color: #10b981;
        }
        
        .summary-card.expense .value {
            color: #ef4444;
        }
        
        .summary-card.profit .value {
            color: #667eea;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        
        .tab {
            padding: 10px 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            white-space: nowrap;
            transition: all 0.2s;
            color: #666;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab:hover {
            background: #f0f0f0;
        }
        
        .tab.active:hover {
            background: #667eea;
        }
        
        .content-area {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .button:hover {
            background: #764ba2;
        }
        
        .button.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .button.secondary:hover {
            background: #e0e0e0;
        }
        
        .button.danger {
            background: #ef4444;
        }
        
        .button.danger:hover {
            background: #dc2626;
        }
        
        .service-card {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
        }
        
        .service-card h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        .service-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            color: #333;
            font-size: 18px;
            font-weight: bold;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }
        
        .table thead {
            background: #f9fafb;
        }
        
        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }
        
        .table th {
            color: #666;
            font-weight: 600;
        }
        
        .table tbody tr:hover {
            background: #f9fafb;
        }
        
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f9fafb;
            padding: 12px;
            border-radius: 8px;
        }
        
        .item-row input,
        .item-row select {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .delete-btn {
            padding: 6px 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #dc2626;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
        }
        
        .progress-fill.complete {
            background: #10b981;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .alert.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        
        .alert.error {
            background: #fee2e2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        
        .data-actions {
            background: #f9fafb;
            padding: 16px;
            border-radius: 12px;
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .data-actions button {
            font-size: 13px;
            padding: 8px 16px;
        }
        
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .summary-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // ローカルストレージ管理
        const Storage = {
            getRevenueToday: () => JSON.parse(localStorage.getItem('revenue_today') || '{}'),
            setRevenueToday: (data) => localStorage.setItem('revenue_today', JSON.stringify(data)),
            
            getExpensesToday: () => JSON.parse(localStorage.getItem('expenses_today') || '{}'),
            setExpensesToday: (data) => localStorage.setItem('expenses_today', JSON.stringify(data)),
            
            getExpenseCategories: () => JSON.parse(localStorage.getItem('expense_categories') || '[]'),
            setExpenseCategories: (data) => localStorage.setItem('expense_categories', JSON.stringify(data)),
            
            getTargets: () => JSON.parse(localStorage.getItem('targets') || '{}'),
            setTargets: (data) => localStorage.setItem('targets', JSON.stringify(data)),
            
            getHistory: () => JSON.parse(localStorage.getItem('revenue_history') || '[]'),
            addHistory: (date, serviceId, amount) => {
                const history = Storage.getHistory();
                history.push({ date, serviceId, amount, timestamp: new Date().getTime() });
                localStorage.setItem('revenue_history', JSON.stringify(history));
            },
            
            clearAll: () => {
                if (confirm('すべてのデータを削除してもよろしいですか？')) {
                    localStorage.clear();
                    window.location.reload();
                }
            },
            
            exportData: () => {
                const data = {
                    revenue_today: Storage.getRevenueToday(),
                    expenses_today: Storage.getExpensesToday(),
                    expense_categories: Storage.getExpenseCategories(),
                    targets: Storage.getTargets(),
                    revenue_history: Storage.getHistory(),
                    exported_at: new Date().toISOString()
                };
                return JSON.stringify(data, null, 2);
            },
            
            importData: (jsonStr) => {
                try {
                    const data = JSON.parse(jsonStr);
                    localStorage.setItem('revenue_today', JSON.stringify(data.revenue_today || {}));
                    localStorage.setItem('expenses_today', JSON.stringify(data.expenses_today || {}));
                    localStorage.setItem('expense_categories', JSON.stringify(data.expense_categories || []));
                    localStorage.setItem('targets', JSON.stringify(data.targets || {}));
                    localStorage.setItem('revenue_history', JSON.stringify(data.revenue_history || []));
                    return true;
                } catch (e) {
                    return false;
                }
            }
        };
        
        const SERVICES = [
            { id: '1', name: '愛しとーと', defaultTarget: 530000 },
            { id: '2', name: '児童手当', defaultTarget: 80000 },
            { id: '3', name: 'GFEF貸付収益', defaultTarget: 16000 },
            { id: '4', name: 'GFEF投資収益', defaultTarget: 60000 },
            { id: '5', name: 'GFEFサブスク', defaultTarget: 370000 },
            { id: '6', name: 'WAVE ORACLE', defaultTarget: 0 },
            { id: '7', name: 'ギャンブル投資', defaultTarget: 0 }
        ];
        
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [revenueToday, setRevenueToday] = useState(Storage.getRevenueToday());
            const [expensesToday, setExpensesToday] = useState(Storage.getExpensesToday());
            const [categories, setCategories] = useState(Storage.getExpenseCategories());
            const [targets, setTargets] = useState(Storage.getTargets());
            const [message, setMessage] = useState('');
            
            const saveRevenue = (data) => {
                Storage.setRevenueToday(data);
                setRevenueToday(data);
            };
            
            const saveExpenses = (data) => {
                Storage.setExpensesToday(data);
                setExpensesToday(data);
            };
            
            const saveCategories = (data) => {
                Storage.setExpenseCategories(data);
                setCategories(data);
            };
            
            const saveTargets = (data) => {
                Storage.setTargets(data);
                setTargets(data);
            };
            
            const formatCurrency = (value) => {
                return `¥${Math.floor(value).toLocaleString('ja-JP')}`;
            };
            
            const totalRevenue = Object.values(revenueToday).reduce((a, b) => a + (Number(b) || 0), 0);
            const totalExpense = Object.values(expensesToday).reduce((a, b) => a + (Number(b) || 0), 0);
            const profit = totalRevenue - totalExpense;
            
            const showMessage = (msg, type = 'success') => {
                setMessage({ text: msg, type });
                setTimeout(() => setMessage(''), 3000);
            };
            
            return (
                <div className="container">
                    <div className="header">
                        <h1>セブンポケット・ダッシュボード</h1>
                        <p>7つの収益源を一元管理</p>
                    </div>
                    
                    {message && (
                        <div className={`alert ${message.type}`}>
                            {message.text}
                        </div>
                    )}
                    
                    <div className="summary-grid">
                        <div className="summary-card revenue">
                            <h3>本日の売上</h3>
                            <div className="value">{formatCurrency(totalRevenue)}</div>
                        </div>
                        <div className="summary-card expense">
                            <h3>本日の支出</h3>
                            <div className="value">{formatCurrency(totalExpense)}</div>
                        </div>
                        <div className="summary-card profit">
                            <h3>本日の利益</h3>
                            <div className="value">{formatCurrency(profit)}</div>
                        </div>
                        <div className="summary-card">
                            <h3>利益率</h3>
                            <div className="value">
                                {totalRevenue > 0 ? Math.round((profit / totalRevenue) * 100) : 0}%
                            </div>
                        </div>
                    </div>
                    
                    <div className="tabs">
                        {[
                            { id: 'dashboard', label: 'ダッシュボード' },
                            { id: 'revenue', label: '売上入力' },
                            { id: 'expense', label: '支出管理' },
                            { id: 'targets', label: '目標値設定' },
                            { id: 'services', label: 'サービス別分析' },
                            { id: 'data', label: 'データ管理' }
                        ].map(t => (
                            <button
                                key={t.id}
                                className={`tab ${activeTab === t.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(t.id)}
                            >
                                {t.label}
                            </button>
                        ))}
                    </div>
                    
                    <div className="content-area">
                        {activeTab === 'dashboard' && (
                            <DashboardTab
                                revenueToday={revenueToday}
                                targets={targets}
                                formatCurrency={formatCurrency}
                            />
                        )}
                        {activeTab === 'revenue' && (
                            <RevenueTab
                                revenueToday={revenueToday}
                                onSave={saveRevenue}
                                formatCurrency={formatCurrency}
                                showMessage={showMessage}
                            />
                        )}
                        {activeTab === 'expense' && (
                            <ExpenseTab
                                categories={categories}
                                expensesToday={expensesToday}
                                onSaveCategories={saveCategories}
                                onSaveExpenses={saveExpenses}
                                formatCurrency={formatCurrency}
                                showMessage={showMessage}
                            />
                        )}
                        {activeTab === 'targets' && (
                            <TargetsTab
                                targets={targets}
                                onSave={saveTargets}
                                formatCurrency={formatCurrency}
                                showMessage={showMessage}
                            />
                        )}
                        {activeTab === 'services' && (
                            <ServicesTab
                                revenueToday={revenueToday}
                                expensesToday={expensesToday}
                                categories={categories}
                                targets={targets}
                                formatCurrency={formatCurrency}
                            />
                        )}
                        {activeTab === 'data' && (
                            <DataTab
                                showMessage={showMessage}
                            />
                        )}
                    </div>
                </div>
            );
        }
        
        function DashboardTab({ revenueToday, targets, formatCurrency }) {
            return (
                <div>
                    <h2 style={{ marginBottom: '24px', color: '#333' }}>今月の概要</h2>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '16px' }}>
                        {SERVICES.map(service => {
                            const revenue = Number(revenueToday[service.id]) || 0;
                            const target = targets[service.id]?.revenue || service.defaultTarget;
                            const progress = target > 0 ? Math.min((revenue / target) * 100, 100) : 0;
                            
                            return (
                                <div key={service.id} className="service-card">
                                    <h3>{service.name}</h3>
                                    <div className="service-stats">
                                        <div className="stat">
                                            <div className="stat-label">本日売上</div>
                                            <div className="stat-value">{formatCurrency(revenue)}</div>
                                        </div>
                                        <div className="stat">
                                            <div className="stat-label">目標値</div>
                                            <div className="stat-value">{formatCurrency(target)}</div>
                                        </div>
                                    </div>
                                    <div className="progress-bar">
                                        <div
                                            className={`progress-fill ${progress >= 100 ? 'complete' : ''}`}
                                            style={{ width: `${progress}%` }}
                                        ></div>
                                    </div>
                                    <div style={{ marginTop: '8px', textAlign: 'right', fontSize: '12px', color: '#666' }}>
                                        {Math.round(progress)}%
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }
        
        function RevenueTab({ revenueToday, onSave, formatCurrency, showMessage }) {
            const [selectedService, setSelectedService] = useState('1');
            const [amount, setAmount] = useState('');
            const [notes, setNotes] = useState('');
            
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!amount) {
                    showMessage('金額を入力してください', 'error');
                    return;
                }
                
                const newData = { ...revenueToday };
                newData[selectedService] = Number(amount);
                onSave(newData);
                
                Storage.addHistory(new Date().toISOString().split('T')[0], selectedService, Number(amount));
                
                setAmount('');
                setNotes('');
                showMessage(`${SERVICES.find(s => s.id === selectedService).name}の売上を記録しました`);
            };
            
            return (
                <div>
                    <h2 style={{ marginBottom: '24px', color: '#333' }}>売上を記録</h2>
                    
                    <div className="grid-2">
                        <div>
                            <form onSubmit={handleSubmit}>
                                <div className="form-group">
                                    <label>サービス選択</label>
                                    <select value={selectedService} onChange={(e) => setSelectedService(e.target.value)}>
                                        {SERVICES.map(s => (
                                            <option key={s.id} value={s.id}>{s.name}</option>
                                        ))}
                                    </select>
                                </div>
                                
                                <div className="form-group">
                                    <label>金額（円）</label>
                                    <input
                                        type="number"
                                        value={amount}
                                        onChange={(e) => setAmount(e.target.value)}
                                        placeholder="0"
                                        step="1000"
                                    />
                                </div>
                                
                                <div className="form-group">
                                    <label>備考（任意）</label>
                                    <textarea
                                        value={notes}
                                        onChange={(e) => setNotes(e.target.value)}
                                        placeholder="メモ"
                                    ></textarea>
                                </div>
                                
                                <button type="submit" className="button">記録する</button>
                            </form>
                        </div>
                        
                        <div>
                            <h3 style={{ marginBottom: '16px', color: '#333' }}>本日の売上</h3>
                            <table className="table">
                                <thead>
                                    <tr>
                                        <th>サービス</th>
                                        <th style={{ textAlign: 'right' }}>金額</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {SERVICES.map(s => (
                                        <tr key={s.id}>
                                            <td>{s.name}</td>
                                            <td style={{ textAlign: 'right' }}>{formatCurrency(Number(revenueToday[s.id]) || 0)}</td>
                                        </tr>
                                    ))}
                                    <tr style={{ fontWeight: 'bold', background: '#f9fafb' }}>
                                        <td>合計</td>
                                        <td style={{ textAlign: 'right' }}>
                                            {formatCurrency(Object.values(revenueToday).reduce((a, b) => a + (Number(b) || 0), 0))}
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }
        
        function ExpenseTab({ categories, expensesToday, onSaveCategories, onSaveExpenses, formatCurrency, showMessage }) {
            const [categoryName, setCategoryName] = useState('');
            const [selectedService, setSelectedService] = useState('');
            const [amount, setAmount] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('');
            const [notes, setNotes] = useState('');
            
            const handleAddCategory = (e) => {
                e.preventDefault();
                if (!categoryName) {
                    showMessage('カテゴリ名を入力してください', 'error');
                    return;
                }
                
                const newCategory = {
                    id: Date.now().toString(),
                    name: categoryName,
                    service: selectedService || 'all'
                };
                
                onSaveCategories([...categories, newCategory]);
                setCategoryName('');
                setSelectedService('');
                showMessage('カテゴリを追加しました');
            };
            
            const handleDeleteCategory = (categoryId) => {
                if (confirm('削除してもよろしいですか？')) {
                    onSaveCategories(categories.filter(c => c.id !== categoryId));
                    showMessage('カテゴリを削除しました');
                }
            };
            
            const handleAddExpense = (e) => {
                e.preventDefault();
                if (!selectedCategory || !amount) {
                    showMessage('カテゴリと金額を入力してください', 'error');
                    return;
                }
                
                const newData = { ...expensesToday };
                newData[selectedCategory] = Number(amount);
                onSaveExpenses(newData);
                
                setAmount('');
                setNotes('');
                setSelectedCategory('');
                showMessage('支出を記録しました');
            };
            
            return (
                <div className="grid-2">
                    <div>
                        <h3 style={{ marginBottom: '16px', color: '#333' }}>支出カテゴリを管理</h3>
                        <form onSubmit={handleAddCategory} style={{ marginBottom: '24px' }}>
                            <div className="form-group">
                                <label>カテゴリ名</label>
                                <input
                                    type="text"
                                    value={categoryName}
                                    onChange={(e) => setCategoryName(e.target.value)}
                                    placeholder="例：広告費、サーバー費用"
                                />
                            </div>
                            
                            <div className="form-group">
                                <label>関連サービス（任意）</label>
                                <select value={selectedService} onChange={(e) => setSelectedService(e.target.value)}>
                                    <option value="">全サービス共通</option>
                                    {SERVICES.map(s => (
                                        <option key={s.id} value={s.id}>{s.name}</option>
                                    ))}
                                </select>
                            </div>
                            
                            <button type="submit" className="button">カテゴリを追加</button>
                        </form>
                        
                        <div>
                            <h4 style={{ marginBottom: '12px', color: '#333' }}>既存カテゴリ</h4>
                            <div className="item-list">
                                {categories.length === 0 ? (
                                    <p style={{ color: '#999', fontSize: '14px' }}>カテゴリはまだありません</p>
                                ) : (
                                    categories.map(cat => (
                                        <div key={cat.id} className="item-row" style={{ justifyContent: 'space-between' }}>
                                            <div>
                                                <div style={{ fontWeight: '600', color: '#333' }}>{cat.name}</div>
                                                {cat.service && cat.service !== 'all' && (
                                                    <div style={{ fontSize: '12px', color: '#999' }}>
                                                        {SERVICES.find(s => s.id === cat.service)?.name}
                                                    </div>
                                                )}
                                            </div>
                                            <button
                                                className="delete-btn"
                                                onClick={() => handleDeleteCategory(cat.id)}
                                            >
                                                削除
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <h3 style={{ marginBottom: '16px', color: '#333' }}>支出を記録</h3>
                        <form onSubmit={handleAddExpense} style={{ marginBottom: '24px' }}>
                            <div className="form-group">
                                <label>カテゴリ</label>
                                <select value={selectedCategory} onChange={(e) => setSelectedCategory(e.target.value)}>
                                    <option value="">選択してください</option>
                                    {categories.map(cat => (
                                        <option key={cat.id} value={cat.id}>{cat.name}</option>
                                    ))}
                                </select>
                            </div>
                            
                            <div className="form-group">
                                <label>金額（円）</label>
                                <input
                                    type="number"
                                    value={amount}
                                    onChange={(e) => setAmount(e.target.value)}
                                    placeholder="0"
                                    step="100"
                                />
                            </div>
                            
                            <div className="form-group">
                                <label>備考（任意）</label>
                                <textarea
                                    value={notes}
                                    onChange={(e) => setNotes(e.target.value)}
                                    placeholder="メモ"
                                ></textarea>
                            </div>
                            
                            <button type="submit" className="button">記録する</button>
                        </form>
                        
                        <h4 style={{ marginBottom: '12px', color: '#333' }}>本日の支出</h4>
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>カテゴリ</th>
                                    <th style={{ textAlign: 'right' }}>金額</th>
                                </tr>
                            </thead>
                            <tbody>
                                {categories.map(cat => (
                                    <tr key={cat.id}>
                                        <td>{cat.name}</td>
                                        <td style={{ textAlign: 'right' }}>{formatCurrency(Number(expensesToday[cat.id]) || 0)}</td>
                                    </tr>
                                ))}
                                <tr style={{ fontWeight: 'bold', background: '#f9fafb' }}>
                                    <td>合計</td>
                                    <td style={{ textAlign: 'right' }}>
                                        {formatCurrency(Object.values(expensesToday).reduce((a, b) => a + (Number(b) || 0), 0))}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }
        
        function TargetsTab({ targets, onSave, formatCurrency, showMessage }) {
            const [selectedService, setSelectedService] = useState('1');
            const [revenueTarget, setRevenueTarget] = useState('');
            const [kpiName, setKpiName] = useState('');
            const [kpiValue, setKpiValue] = useState('');
            
            useEffect(() => {
                if (targets[selectedService]) {
                    setRevenueTarget(targets[selectedService].revenue || '');
                    setKpiName(targets[selectedService].kpiName || '');
                    setKpiValue(targets[selectedService].kpiValue || '');
                } else {
                    setRevenueTarget('');
                    setKpiName('');
                    setKpiValue('');
                }
            }, [selectedService, targets]);
            
            const handleSubmit = (e) => {
                e.preventDefault();
                
                const newTargets = { ...targets };
                newTargets[selectedService] = {
                    revenue: revenueTarget ? Number(revenueTarget) : null,
                    kpiName: kpiName,
                    kpiValue: kpiValue ? Number(kpiValue) : null
                };
                
                onSave(newTargets);
                showMessage('目標値を設定しました');
            };
            
            return (
                <div style={{ maxWidth: '500px' }}>
                    <h2 style={{ marginBottom: '24px', color: '#333' }}>目標値を設定</h2>
                    
                    <form onSubmit={handleSubmit}>
                        <div className="form-group">
                            <label>サービス</label>
                            <select value={selectedService} onChange={(e) => setSelectedService(e.target.value)}>
                                {SERVICES.map(s => (
                                    <option key={s.id} value={s.id}>{s.name}</option>
                                ))}
                            </select>
                        </div>
                        
                        <div className="form-group">
                            <label>月間売上目標（円）</label>
                            <input
                                type="number"
                                value={revenueTarget}
                                onChange={(e) => setRevenueTarget(e.target.value)}
                                placeholder="0"
                                step="10000"
                            />
                        </div>
                        
                        <div className="form-group">
                            <label>KPI名</label>
                            <input
                                type="text"
                                value={kpiName}
                                onChange={(e) => setKpiName(e.target.value)}
                                placeholder="例：ユーザー数、転換率"
                            />
                        </div>
                        
                        <div className="form-group">
                            <label>KPI目標値</label>
                            <input
                                type="number"
                                value={kpiValue}
                                onChange={(e) => setKpiValue(e.target.value)}
                                placeholder="0"
                                step="1"
                            />
                        </div>
                        
                        <button type="submit" className="button">保存</button>
                    </form>
                </div>
            );
        }
        
        function ServicesTab({ revenueToday, expensesToday, categories, targets, formatCurrency }) {
            return (
                <div>
                    <h2 style={{ marginBottom: '24px', color: '#333' }}>サービス別分析</h2>
                    
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '16px' }}>
                        {SERVICES.map(service => {
                            const revenue = Number(revenueToday[service.id]) || 0;
                            const target = targets[service.id]?.revenue || service.defaultTarget;
                            const kpiName = targets[service.id]?.kpiName;
                            const kpiValue = targets[service.id]?.kpiValue;
                            
                            // サービスに紐付く支出を計算
                            const serviceExpenses = categories
                                .filter(c => !c.service || c.service === 'all' || c.service === service.id)
                                .reduce((sum, c) => sum + (Number(expensesToday[c.id]) || 0), 0);
                            
                            const profit = revenue - serviceExpenses;
                            
                            return (
                                <div key={service.id} className="service-card">
                                    <h3>{service.name}</h3>
                                    
                                    <table className="table" style={{ fontSize: '13px' }}>
                                        <tbody>
                                            <tr>
                                                <td style={{ width: '50%' }}>本日売上</td>
                                                <td style={{ textAlign: 'right', fontWeight: 'bold', color: '#10b981' }}>
                                                    {formatCurrency(revenue)}
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>本日支出</td>
                                                <td style={{ textAlign: 'right', color: '#ef4444' }}>
                                                    {formatCurrency(serviceExpenses)}
                                                </td>
                                            </tr>
                                            <tr style={{ background: '#f9fafb' }}>
                                                <td style={{ fontWeight: 'bold' }}>利益</td>
                                                <td style={{ textAlign: 'right', fontWeight: 'bold', color: '#667eea' }}>
                                                    {formatCurrency(profit)}
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>月間目標</td>
                                                <td style={{ textAlign: 'right' }}>{formatCurrency(target)}</td>
                                            </tr>
                                            <tr>
                                                <td>進捗率</td>
                                                <td style={{ textAlign: 'right', fontWeight: 'bold' }}>
                                                    {target > 0 ? Math.round((revenue / target) * 100) : 0}%
                                                </td>
                                            </tr>
                                            {kpiName && (
                                                <tr>
                                                    <td>{kpiName}</td>
                                                    <td style={{ textAlign: 'right' }}>{kpiValue}</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }
        
        function DataTab({ showMessage }) {
            const [importText, setImportText] = useState('');
            
            const handleExport = () => {
                const data = Storage.exportData();
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `seven-pockets-backup-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                showMessage('データをエクスポートしました');
            };
            
            const handleImport = () => {
                if (!importText.trim()) {
                    showMessage('JSONデータを貼り付けてください', 'error');
                    return;
                }
                
                if (Storage.importData(importText)) {
                    showMessage('データをインポートしました');
                    setImportText('');
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    showMessage('データのインポートに失敗しました', 'error');
                }
            };
            
            return (
                <div>
                    <h2 style={{ marginBottom: '24px', color: '#333' }}>データ管理</h2>
                    
                    <div className="grid-2">
                        <div>
                            <h3 style={{ marginBottom: '16px', color: '#333' }}>バックアップ</h3>
                            <p style={{ color: '#666', marginBottom: '16px', fontSize: '14px' }}>
                                現在のすべてのデータをJSONファイルとしてダウンロードします。
                            </p>
                            <button className="button" onClick={handleExport}>
                                データをエクスポート
                            </button>
                        </div>
                        
                        <div>
                            <h3 style={{ marginBottom: '16px', color: '#333' }}>復元</h3>
                            <div className="form-group">
                                <label>JSONデータを貼り付け</label>
                                <textarea
                                    value={importText}
                                    onChange={(e) => setImportText(e.target.value)}
                                    placeholder="バックアップファイルの内容を貼り付けてください"
                                    style={{ minHeight: '150px' }}
                                ></textarea>
                            </div>
                            <button className="button" onClick={handleImport}>
                                データをインポート
                            </button>
                        </div>
                    </div>
                    
                    <div style={{ marginTop: '32px', padding: '16px', background: '#fee2e2', borderRadius: '8px', borderLeft: '4px solid #ef4444' }}>
                        <h3 style={{ marginBottom: '12px', color: '#7f1d1d' }}>危険ゾーン</h3>
                        <button
                            className="button danger"
                            onClick={() => Storage.clearAll()}
                        >
                            すべてのデータを削除
                        </button>
                        <p style={{ color: '#7f1d1d', fontSize: '13px', marginTop: '8px' }}>
                            この操作は取り消せません。本当に確実な場合のみをクリックしてください。
                        </p>
                    </div>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
